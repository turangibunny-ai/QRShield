<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QRShield Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<h1 class="title">QR<span>Shield</span></h1>
<p class="subtitle">Cyber URL Threat Scanner</p>

<div class="tabs">

<button class="tab active" data-tab="camera">📷 Camera</button>
<button class="tab" data-tab="file">📁 Upload</button>
<button class="tab" data-tab="url">🔗 URL</button>

</div>


<div class="panel active" id="camera">

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<button id="startCamera">Start Scan</button>

<p id="cameraResult"></p>

</div>



<div class="panel" id="file">

<input type="file" id="fileInput" accept="image/*">

<p id="fileResult"></p>

</div>



<div class="panel" id="url">

<input type="text" id="urlInput" placeholder="Paste URL here">

<button id="scanBtn">Scan URL</button>

</div>



<div id="results" class="results">

<h2 id="statusText"></h2>

<div class="scoreBar">
<div id="scoreFill"></div>
</div>

<p id="riskScore"></p>

<ul id="reasons"></ul>

<p id="advice"></p>

</div>


</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
