<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QRShield Security Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0c1428,#111827,#0f172a);
color:#e2e8f0;
min-height:100vh;
padding:20px;
}

.main-header{
text-align:center;
margin-bottom:20px;
}

h1{
font-size:2.5rem;
background:linear-gradient(135deg,#3b82f6,#8b5cf6);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
}

.subtitle{
color:#94a3b8;
margin-top:5px;
}

.container{
background:rgba(30,41,59,0.95);
padding:25px;
border-radius:20px;
max-width:500px;
margin:auto;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.section-title{
margin-top:20px;
margin-bottom:10px;
text-align:center;
}

#reader{
width:100%;
height:260px;
border-radius:12px;
overflow:hidden;
background:black;
}

.button-group{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

button{
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:#3b82f6;
color:white;
}

.btn-secondary{
background:#6b7280;
color:white;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
background:#0f172a;
color:white;
}

.divider{
height:1px;
background:rgba(255,255,255,0.08);
margin:20px 0;
}

#resultBox{
margin-top:20px;
padding:20px;
border-radius:15px;
background:rgba(15,23,42,0.9);
}

.progress{
width:100%;
height:12px;
background:rgba(255,255,255,0.08);
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

#progressBar{
height:100%;
width:0%;
border-radius:10px;
transition:0.5s;
}

.reason-list{
margin-top:10px;
font-size:0.9rem;
color:#fca5a5;
text-align:left;
}

.advice-list{
margin-top:10px;
font-size:0.9rem;
color:#93c5fd;
text-align:left;
}

.loader{
border:4px solid rgba(255,255,255,0.1);
border-top:4px solid #3b82f6;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:15px auto;
display:none;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div class="main-header">

<h1>QRShield</h1>

<p class="subtitle">
Advanced Malware & Phishing Scanner
</p>

</div>

<div class="container">

<h3 class="section-title">Camera QR Scanner</h3>

<div id="reader"></div>

<div class="button-group">

<button class="btn-primary" onclick="startCamera()">
Start Scanner
</button>

<button class="btn-secondary" onclick="stopCamera()">
Stop Scanner
</button>

</div>

<div class="divider"></div>

<h3 class="section-title">Direct URL Scan</h3>

<input
type="text"
id="manualURL"
placeholder="Paste URL here"
/>

<div class="button-group">

<button
class="btn-secondary"
onclick="scanManualURL()"
>

Scan URL

</button>

</div>

<div id="resultBox">

<p id="urlText"></p>

<p id="result"></p>

<div class="progress">

<div id="progressBar"></div>

</div>

<div id="reasons" class="reason-list"></div>

<div id="advice" class="advice-list"></div>

<div id="loader" class="loader"></div>

</div>

</div>

<script>

let qrScanner=null

const result=document.getElementById("result")

const loader=document.getElementById("loader")

const urlText=document.getElementById("urlText")


function startCamera(){

if(qrScanner){
return
}

qrScanner=new Html5Qrcode("reader")

qrScanner.start(

{ facingMode:"environment" },

{ fps:10, qrbox:250 },

(qrText)=>{

stopCamera()

checkURL(qrText)

}

)

}


function stopCamera(){

if(qrScanner){

qrScanner.stop()

.then(()=>{

qrScanner.clear()

qrScanner=null

})

.catch(err=>{

console.log(err)

})

}

}


function scanManualURL(){

let url=document
.getElementById("manualURL")
.value
.trim()

if(!url){

result.innerHTML="Enter URL"

return

}

if(!url.startsWith("http")){

url="https://"+url

}

checkURL(url)

}


function checkURL(url){

urlText.innerHTML="Scanning: "+url

loader.style.display="block"

fetch("/check",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({url:url})

})

.then(res=>res.json())

.then(data=>{

loader.style.display="none"

const risk=data.scan_score||0

let level="Safe"

let color="#22c55e"

if(risk>=80){

level="Malicious"

color="#ef4444"

}

else if(risk>=50){

level="Dangerous"

color="#f59e0b"

}

result.innerHTML=

"<b style='color:"+color+"'>"

+level+

"</b><br>Score : "

+risk+

"%"

const bar=document
.getElementById("progressBar")

bar.style.width=risk+"%"

bar.style.background=color


let r="<b>Reasons</b><ul>"

data.reasons.forEach(i=>{

r+="<li>"+i+"</li>"

})

r+="</ul>"

document.getElementById("reasons").innerHTML=r


document.getElementById("advice").innerHTML=

"<b>Advice</b><p>"+data.advice+"</p>"

})

.catch(()=>{

loader.style.display="none"

result.innerHTML="Server Error"

})

}

</script>

</body>
</html>
