<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR SHIELD — ULTRA SCAN v5.0</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#020509;
color:#b8e8ff;
font-family:'Rajdhani',sans-serif;
padding:40px;
text-align:center;
}

h1{
font-family:'Orbitron',sans-serif;
color:#05f3d3;
}

.container{
max-width:700px;
margin:auto;
background:rgba(0,12,24,0.8);
padding:30px;
border:1px solid rgba(0,245,255,0.3);
border-radius:6px;
}

.url-row{
display:flex;
gap:10px;
margin-top:20px;
}

.url-in{
flex:1;
padding:12px;
background:#020d18;
border:1px solid rgba(0,245,255,0.3);
color:#fff;
font-family:monospace;
}

.btn{
padding:12px 20px;
border:none;
cursor:pointer;
font-family:Orbitron;
}

.btn-p{
background:#05f3d3;
color:black;
}

.loading{
display:none;
margin-top:20px;
}

.loading.show{
display:block;
}

.result{
display:none;
margin-top:30px;
text-align:left;
}

.result.show{
display:block;
}

.err{
color:#ff3366;
margin-top:10px;
display:none;
}

.err.show{
display:block;
}

.score{
font-size:40px;
font-family:Orbitron;
}

.v-label{
font-size:22px;
margin-bottom:10px;
}

.finding{
padding:10px;
border:1px solid rgba(255,230,0,0.3);
margin-bottom:8px;
background:rgba(255,230,0,0.05);
}

</style>
</head>

<body>

<h1>QR SHIELD — ULTRA SCAN</h1>

<div class="container">

<div class="url-row">

<input class="url-in" id="urlInput" placeholder="https://example.com">

<button class="btn btn-p" id="scanButton">
SCAN
</button>

</div>

<div class="err"></div>

<div class="loading">
Analyzing URL...
</div>

<div class="result">

<div class="score">
<span class="score-n">0</span>
</div>

<div class="v-label"></div>

<h3>Findings</h3>

<div id="findingsList"></div>

</div>

</div>

<script>

const API_BASE = "https://qrshield-api.onrender.com";

async function scanURL(url){

showLoading();

try{

const response = await fetch(`${API_BASE}/check-url`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
url:url
})
});

const data = await response.json();

hideLoading();

if(data.error){
showError(data.error);
return;
}

showResult(data);

}catch(err){

hideLoading();
showError("Backend connection failed");

console.error(err);
}

}

function showLoading(){
document.querySelector(".loading").classList.add("show");
}

function hideLoading(){
document.querySelector(".loading").classList.remove("show");
}

function showError(msg){
const el=document.querySelector(".err");
el.innerText=msg;
el.classList.add("show");
}

function showResult(data){

const resultBox=document.querySelector(".result");
resultBox.classList.add("show");

const score=data.risk_score;
const verdict=data.verdict;
const reasons=data.reasons || [];

document.querySelector(".score-n").innerText=score;

document.querySelector(".v-label").innerText=verdict.toUpperCase();

const findingsContainer=document.querySelector("#findingsList");

findingsContainer.innerHTML="";

reasons.forEach(r=>{
const div=document.createElement("div");
div.className="finding";
div.innerText=r;
findingsContainer.appendChild(div);
});

}

document.addEventListener("DOMContentLoaded",()=>{

const scanBtn=document.querySelector("#scanButton");
const urlInput=document.querySelector("#urlInput");

scanBtn.addEventListener("click",()=>{

const url=urlInput.value.trim();

if(!url){
showError("Enter URL first");
return;
}

scanURL(url);

});

});

</script>

</body>
</html>
