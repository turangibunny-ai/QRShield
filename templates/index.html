<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>QR SHIELD | Cyber Scanner</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

</head>

<body>

<div class="main">

<h1 class="logo">QR<span>SHIELD</span></h1>

<p class="tag">AI Powered QR Threat Scanner</p>


<div class="options">

<button onclick="openTab('camera')" class="tab active">Camera Scan</button>

<button onclick="openTab('upload')" class="tab">Upload QR</button>

<button onclick="openTab('url')" class="tab">Paste URL</button>

</div>


<!-- CAMERA -->

<div id="camera" class="tabcontent active">

<div id="reader"></div>

<p class="note">Scan QR using camera</p>

</div>


<!-- FILE -->

<div id="upload" class="tabcontent">

<input type="file" id="fileInput" accept="image/*">

<canvas id="canvas"></canvas>

<p class="note">Upload QR image</p>

</div>


<!-- URL -->

<div id="url" class="tabcontent">

<input type="text" id="urlText" placeholder="Paste suspicious URL">

<button class="scanbtn" onclick="scanURL()">Scan URL</button>

</div>



<div class="result">

<h3>Scan Result</h3>

<div id="output">Waiting for scan...</div>

</div>


</div>

<script src="script.js"></script>

</body>
</html>
